services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    env_file: .env
    ports:
      - "${API_PORT}:3001"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: ./app
    env_file: .env
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
