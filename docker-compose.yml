services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
    ports:
      - "${API_PORT}:3001"
    volumes:
      - ./api:/app/api
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - ./app:/app/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
